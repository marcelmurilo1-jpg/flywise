providers = ["node"]

[phases.setup]
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0",
  "libcups2", "libdrm2", "libxkbcommon0", "libxcomposite1",
  "libxdamage1", "libxfixes3", "libxrandr2", "libgbm1",
  "libasound2", "libpango-1.0-0", "libcairo2", "libatspi2.0-0",
  "libx11-6", "libxcb1", "libxext6", "fonts-liberation",
  "chromium", "chromium-driver"
]

# Playwright install removido — o chromium do apt (acima) já é usado como fallback
# via resolveChromiumPath() em server.js (/usr/bin/chromium).
# Isso reduz o tamanho da imagem e o tempo de build.

[start]
cmd = "node server.js"
