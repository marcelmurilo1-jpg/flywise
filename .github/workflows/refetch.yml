name: 🔁 FlyWise Refetch — reprocessar posts existentes

on:
  workflow_dispatch:
    inputs:
      fonte:
        description: "Fonte a reprocessar (vazio = ambas)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "passageirodeprimeira.com"
          - "melhoresdestinos.com.br"
      min_conteudo:
        description: "Reprocessar apenas posts com conteudo abaixo de N chars (vazio = todos)"
        required: false
        default: "1500"
      limit:
        description: "Máximo de posts (vazio = sem limite)"
        required: false
        default: ""
      dry_run:
        description: "Dry-run (não grava no banco)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  refetch:
    name: Re-extrair conteúdo
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: 📦 Dependências
        run: pip install -r scraper/requirements.txt

      - name: 🔁 Rodar refetch
        working-directory: scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.fonte }}" ];        then ARGS="$ARGS --fonte ${{ inputs.fonte }}"; fi
          if [ -n "${{ inputs.min_conteudo }}" ]; then ARGS="$ARGS --min-conteudo ${{ inputs.min_conteudo }}"; fi
          if [ -n "${{ inputs.limit }}" ];        then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ];then ARGS="$ARGS --dry-run"; fi
          echo "Executando: python refetch_all.py $ARGS"
          python refetch_all.py $ARGS
